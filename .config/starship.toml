"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """[鈺攢](blue bold) $username\
$hostname\
$localip\
$shlvl\
$kubernetes\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$docker_context\
$c\
$deno\
$dotnet\
$elixir\
$erlang\
$golang\
$haskell\
$helm\
$lua\
$nodejs\
$ocaml\
$python\
$rust\
$terraform\
$zig\
$conda\
$memory_usage\
$direnv\
$env_var\
$custom\
$sudo\
$cmd_duration\
$line_break[鈺扳攢](blue bold)\
$jobs\
$time\
$status\
$os\
$container\
$shell\
$character"""

[cmd_duration]
format = '[$duration](bold yellow) '

[hostname]
ssh_symbol = '蟀⒐ '
format = '[$ssh_symbol$hostname]($style)'
style = 'blue'

[username]
format = '[$user]($style)'
style_user = 'purple'
