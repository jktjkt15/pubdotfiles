# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,4096x2160@60,auto,1
monitor=,3840x2160@120,auto,1

# Execute your favorite apps at launch
exec-once = waybar
exec-once = mako
exec-once = hyprpaper --config ~/.config/hypr/hyprpaper.conf
exec-once = steam
exec-once = vesktop
exec-once = signal
# exec-once = slack
# exec-once = set -g WLR_NO_HARDWARE_CURSORS 1

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# $terminal = wezterm start --always-new-process
$terminal = kitty
# $sshTerminal = kitty --name kitten_ssh fish -c ~/repos/scripts/kitty_ssh.fish
# $fileManager = dolphin
# $menu = hyprlauncher
# $menu = fuzzel -l 8
$menu = rofi -theme ~/.config/rofi/rofi.rasi -show drun
# $lock = swaylock --screenshot --fade-in 0.1 --clock --indicator --ring-color 5a84e5 --key-hl-color 62ea76 --line-color 1f2228 --inside-color 1f2228 --separator-color 353b45 --text-color f2f3f3 --font "Caskaydia Nerd Font Mono" --effect-vignette 0.5:O.5 --text-clear-color f2f3f3 --text-ver-color f2f3f3 --text-wrong-color f2f3f3 --inside-wrong-color 1f2228 --inside-ver-color 1f2228 --inside-clear-color 1f2228 --ring-ver-color 5a84e5 --ring-clear-color 5a84e5 --ring-wrong-color ea708e --indicator-radius 150 --bs-hl-color ea708e  --effect-blur 7x5
$lock = hyprlock

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = #compose:pause
    kb_rules =

    follow_mouse = 0

    touchpad {
        natural_scroll = no
    }

    mouse {

    }

    sensitivity = 1 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
}

general {
    gaps_in = 5
    gaps_out = 10,15,10,15
    border_size = 2
    # col.active_border = rgba(61afefcc) rgba(61afefcc) 45deg
    col.active_border = rgba(1A1B26ff) rgba(1A1B26ff) 180deg

    col.inactive_border = rgba(1A1B26ff)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See htps://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 4
    
    blur {
        enabled = false
        size = 1
        passes = 1
    }

    shadow {
        enabled = yes
        range = 15
        render_power = 5
        # color = rgba(1A1B26ff)
        color = rgba(EBCB8Bff)
        color_inactive = rgba(00000000)
    }
}

animations {
    enabled = yes

    # bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = bezIn, 0.5,0.0,1.0,1.2
    bezier = bezOut, 0.0,0.5,0.5,1.0
    bezier = fastStart, 0.18,0.89,0.62,0.52
    bezier = overshot, 0.05,0.9,0.1,1.05
    bezier = superOvershot, 0.05,0.9,0.1,1.3
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = softsnap, 0.4, 0, 0.2, 1

    # animation = windows, 1, 5, overshot, popin 80%
    animation = windowsIn, 1, 3, softsnap, popin 85%
    animation = windowsOut, 1, 3, overshot, popin 100%
    animation = windowsMove, 1, 4, softsnap
    animation = border, 1, 100, softsnap
    animation = borderangle, 1, 8, default
    animation = workspaces, 1, 2, softsnap, slidefade 50%

    # animation = fadeIn, 1, 4, smoothIn
    # animation = fadeOut, 1, 4, smoothOut
    animation = fadeSwitch, 1, 4, smoothIn
    animation = fadeDim, 1, 2, smoothIn
    animation = fadeShadow, 1, 3, superOvershot
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    # pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
    force_split = 2
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = false
}

# gestures {
#     # See https://wiki.hyprland.org/Configuring/Variables/ for more
#     workspace_swipe = off
# }

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic-mouse-v1 {
#     sensitivity = -0.5
# }

# unscale XWayland
xwayland {
  force_zero_scaling = true
}

# toolkit-specific scale
env = GDK_SCALE,2
env = XCURSOR_SIZE,32

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.
# windowrule = opacity 0.87 override 0.8 override,class:(wezterm) 
windowrule = match:class kitty, opacity 0.87 0.92
windowrule = match:class (slack), opacity 0.97 override 0.97 override
windowrule = match:class (signal), opacity 0.97 override 0.97 override
windowrule = match:title ^(Discord \|).*, opacity 0.97 override 0.97 override
windowrule = match:class floorp, opacity 0.9 override 0.9 override
# windowrule = match:class floorp, dim_around on
windowrule = match:class zen, opacity 0.95 override 0.95 override
windowrule = match:class steam, opacity 0.95 override 0.95 override
windowrule = match:title .*(YouTube . Ablaze Floorp).*, opacity 1 override 1 override
# windowrule = match:title ^(▶),opacity 1 override 1 override
# windowrule = match:class (.*)(- YouTube - Brave)$,opacity 1 override 1 override
windowrule = match:class (.*)(- Twitch),opacity 1 override 1 override
windowrule = match:title Picture-in-Picture,opacity 1 override 1 override
# windowrule = match:title ^\(SSH\).*, border_color rgba(ffb65baa) rgba(ffb65baa)
# windowrule = match:title ^\(SSH\).*, border_size 4 4
windowrule = match:class Brave, workspace 5
windowrule = match:class slack, workspace 3
windowrule = match:class zen, workspace 4
windowrule = match:class signal, workspace 3
windowrule = match:class org.remmina.Remmina, workspace 2
windowrule = match:title Steam, workspace 7
windowrule = match:class vesktop, workspace 3
# windowrule = match:title ^(Picture-in-Picture)$, float on
# windowrule = match:title ^(Picture-in-Picture)$, pin on
# windowrulev2 = match:class sshlauncher workspace 9
# windowrulev2 = workspace 1,class:(weztermssh)
# windowrule = opacity 1 override 1 override,title:(.*)YouTube(.*)

# workspace = special:music
# windowrule = special:music, opacity 1, override 1 override

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = ALT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = , F4, exec, $terminalNew
bind = $mainMod, RETURN, exec, $terminal
# bind = , F2, exec, $sshTerminal 
bind = $mainMod, Q, killactive, 
bind = SUPER, M, exit, 
# bind = $mainMod, E, exec, $fileManager
bind = SUPER, V, togglefloating, 
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, fullscreen, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, x, layoutmsg, swapsplit # dwindle
bind = $mainMod, o, togglespecialworkspace, music# dwindle
bind = SUPER, S, exec, ~/repos/scripts/screenshot.fish
bind = SUPER, W, exec, remmina -c .local/share/remmina/group_rdp_quick-connect_10-10-10-5.remmina
bind = SUPER, L, exec, $lock
bind = SUPER, G, exec, kitty ~/repos/scripts/steam_fuzzy.sh 
bind = SUPER, P, exec, rmpc togglepause
bind = SUPER, N, exec, rmpc prev
bind = SUPER, E, exec, rmpc next
# bind = $mainMod, C, exec, makoctl --dismiss all
bind = SUPER, R, exec, killall waybar; waybar
# bind = SUPER, O, exec, [workspace special:music silent] kitty rmpc 
# bind = SUPER, O, exec, [workspace special:music silent] kitty -- yazi ~/Music/
bind = SUPER, O, exec, [workspace special:music silent] kitty rmpc
bind = SUPER, O, exec, [workspace special:music silent] kitty -- yazi ~/Music
bind = SUPER, O, exec, [workspace special:music silent] kitty -- wiremix

# bind = SUPER, A, forcerendererreload
# bind = SUPER, H, exec, $kittyTerm

# bind = SUPER, 1, exec, wtype 'é'
# bind = SUPER, 2, exec, wtype 'è'
# bind = SUPER, 3, exec, wtype 'ê'
# bind = SUPER, 4, exec, wtype 'à'
# bind = SUPER, 5, exec, wtype 'ù'
# bind = SUPER, 6, exec, wtype 'ç'

# bind = SUPER, D, exec, ydotool mousemove --wheel 0 -10
# bind = SUPER, U, exec, ydotool mousemove --wheel 0 10
# bind = SUPER, F, exec, ydotool mousemove -- 0 -20
# bind = SUPER, S, exec, ydotool mousemove -- 0 20
# bind = SUPER, R, exec, ydotool mousemove -- -20 0
# bind = SUPER, T, exec, ydotool mousemove -- 20 0
# Move focus with mainMod + arrow keys

bind = $mainMod, r, movefocus, l
bind = $mainMod, t, movefocus, r
bind = $mainMod, f, movefocus, u
bind = $mainMod, s, movefocus, d

# Switch workspaces with mainMod + [0-9]
# bind = $mainMod, 1, workspace, 1
# bind = $mainMod, 2, workspace, 2
# bind = $mainMod, 3, workspace, 3
# bind = $mainMod, 4, workspace, 4
# bind = $mainMod, 5, workspace, 5
# bind = $mainMod, 6, workspace, 6
# bind = $mainMod, 7, workspace, 7
# bind = $mainMod, 8, workspace, 8
# bind = $mainMod, 9, workspace, 9
# bind = $mainMod, 0, workspace, 10

bind = $mainMod, l, workspace, 1
bind = $mainMod, u, workspace, 2
bind = $mainMod, y, workspace, 3
bind = $mainMod, n, workspace, 4
bind = $mainMod, e, workspace, 5
bind = $mainMod, i, workspace, 6
bind = $mainMod, h, workspace, 7
# bind = $mainMod, '.', workspace, 7
# bind = $mainMod, ,, workspace, 8
# bind = $mainMod, ., workspace, 9
# bind = $mainMod, o, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, l, movetoworkspacesilent, 1
bind = $mainMod SHIFT, u, movetoworkspacesilent, 2
bind = $mainMod SHIFT, y, movetoworkspacesilent, 3
bind = $mainMod SHIFT, n, movetoworkspacesilent, 4
bind = $mainMod SHIFT, e, movetoworkspacesilent, 5
bind = $mainMod SHIFT, i, movetoworkspacesilent, 6
bind = $mainMod SHIFT, h, movetoworkspacesilent, 7
# bind = $mainMod SHIFT, 8, movetoworkspace, 8
# bind = $mainMod SHIFT, 9, movetoworkspace, 9
# bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod, F12, submap, game

submap = game

# unbind = $mainMod, mouse:272
# unbind = $mainMod, mouse:273
#
# bindm = $mainMod, mouse:273, 
bind = $mainMod, F12, submap, reset

submap = reset
